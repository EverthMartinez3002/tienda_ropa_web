services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tienda_ropa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - db
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@db:5432/tienda_ropa
      SESSION_HOURS: 12
      SECURE_COOKIES: "false"
      ADMIN_EMAIL: admin@su-tienda.local
      ADMIN_PASSWORD: ChangeMeNow_123!
      PASSWORD_PEPPER: change-this-extra-secret
      BRAND_NAME: Mi Boutique
      WHATSAPP_NUMBER: "50370000000"
      CONTACT_EMAIL: hola@su-tienda.com
      INSTAGRAM_URL: https://www.instagram.com/su_tienda
      FACEBOOK_URL: https://www.facebook.com/su_tienda
      PAYMENT_ALLOWED_HOSTS: checkout.stripe.com,paypal.com,www.paypal.com
      DEFAULT_PAYMENT_LINK: https://example.com/pago
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/storage/uploads

volumes:
  postgres_data:
  uploads_data:
